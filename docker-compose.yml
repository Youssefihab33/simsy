services:
  backend:
    build: ./backend
    ports:
      - '8000:80'
    volumes:
      - ./backend:/usr/src/app/simsy
      - ./backend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data/db.sqlite3:/usr/src/app/data/db.sqlite3
      - ./data/media:/usr/src/app/data/media
      - django_static:/usr/src/app/data/static
    env_file: 'backend/.env'
    restart: always

  frontend:
    build: ./frontend
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./frontend/conf/:/etc/nginx/conf.d/

      - django_static:/usr/src/data/static:ro
      - ./data/media:/usr/src/data/media:ro
      - ./data/films:/usr/src/data/films:ro
      - ./data/series:/usr/src/data/series:ro
      - ./data/captions:/usr/src/data/captions:ro

      - ./data/certbot/conf:/etc/letsencrypt              # Certbot configs and certificates
      - ./data/certbot/www:/var/www/certbot:ro            # webroot for Certbot challenges
    env_file: 'frontend/.env.production'
    restart: always
    depends_on:
      - backend

  certbot:
    image: certbot/certbot
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt              # Same volume as Nginx for certificates
      - ./data/certbot/www:/var/www/certbot               # Same volume as Nginx for webroot challenges
    dns:
      - 8.8.8.8
      - 8.8.4.4
    # Use --staging for testing (in the command below) to avoid hitting Let's Encrypt rate limits
    # Remove --staging for producing certificates
    command: certonly --webroot -w /var/www/certbot --email youssefihab33@gmail.com --agree-tos --no-eff-email -d simsy.redirectme.net

volumes:
  django_static:
